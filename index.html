<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>College Week Planner</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

  <div class="app">

    <aside class="sidebar">

      <h1>College Week</h1>

      <p class="subtitle">
        Intelligent weekly planner
      </p>

      <div class="toggle-box">

        <label class="switch">

          <input type="checkbox" id="examMode">

          <span class="slider"></span>

        </label>

        <span>Exam Mode</span>

      </div>

      <button id="generateBtn">
        Generate Week
      </button>

      <div class="summary">

        <div class="summary-card">
          <h3>Meals</h3>
          <p id="mealCount">0</p>
        </div>

        <div class="summary-card">
          <h3>Snacks</h3>
          <p id="snackCount">0</p>
        </div>

        <div class="summary-card">
          <h3>Gym</h3>
          <p id="gymCount">0</p>
        </div>

        <div class="summary-card">
          <h3>Prep Day</h3>
          <p id="prepDay">-</p>
        </div>

      </div>

      <div class="warning hidden" id="warningBox">
        <strong>Warning</strong>
        <p id="warningText"></p>
      </div>

    </aside>

    <main class="main-content">

      <section class="inputs-section">

        <div class="section-header">
          <h2>Weekly Inputs</h2>
        </div>

        <div class="days-container" id="daysContainer"></div>

      </section>

      <section class="calendar-section">

        <div class="section-header">
          <h2>Generated Timetable</h2>
        </div>

        <div class="calendar-wrapper">

          <table id="calendar">

            <thead>

              <tr>
                <th>Time</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
                <th>Sun</th>
              </tr>

            </thead>

            <tbody id="calendarBody"></tbody>

          </table>

        </div>

      </section>

    </main>

  </div>

  <script src="script.js"></script>

</body>
</html>
