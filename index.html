
<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>College Planner</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

  <div class="app">

    <aside class="sidebar">

      <h1>College Week</h1>

      <p class="subtitle">
        Smart automatic weekly planner
      </p>

      <div class="toggle-box">

        <label class="switch">

          <input type="checkbox" id="examMode">

          <span class="slider"></span>

        </label>

        <span>Exam Mode</span>

      </div>

      <button id="generateBtn">
        Generate Week
      </button>

      <div class="summary">

        <div class="summary-card">
          <h3>Meals</h3>
          <p id="mealCount">0</p>
        </div>

        <div class="summary-card">
          <h3>Snacks</h3>
          <p id="snackCount">0</p>
        </div>

        <div class="summary-card">
          <h3>Gym</h3>
          <p id="gymCount">0</p>
        </div>

        <div class="summary-card">
          <h3>Prep Day</h3>
          <p id="prepDay">-</p>
        </div>

      </div>

      <div class="warning hidden" id="warningBox">

        <strong>Warning</strong>

        <p id="warningText"></p>

      </div>

    </aside>

    <main class="main-content">

      <section>

        <div class="section-header">
          <h2>Weekly Inputs</h2>
        </div>

        <div class="days-container">

          <!-- MONDAY -->
          <div class="day-card">
            <h3>Monday</h3>

            <div class="input-group">
              <label>Lecture Start</label>
              <input type="time" id="Monday-start">
            </div>

            <div class="input-group">
              <label>Lecture End</label>
              <input type="time" id="Monday-end">
            </div>

            <div class="input-group">
              <label>Event / Plan</label>
              <input type="text" id="Monday-event">
            </div>

            <div class="checkbox">
              <input type="checkbox" id="Monday-busy">
              <label>Busy Evening</label>
            </div>
          </div>

          <!-- TUESDAY -->
          <div class="day-card">
            <h3>Tuesday</h3>

            <div class="input-group">
              <label>Lecture Start</label>
              <input type="time" id="Tuesday-start">
            </div>

            <div class="input-group">
              <label>Lecture End</label>
              <input type="time" id="Tuesday-end">
            </div>

            <div class="input-group">
              <label>Event / Plan</label>
              <input type="text" id="Tuesday-event" placeholder="HAIP">
            </div>

            <div class="checkbox">
              <input type="checkbox" id="Tuesday-busy">
              <label>Busy Evening</label>
            </div>
          </div>

          <!-- WEDNESDAY -->
          <div class="day-card">
            <h3>Wednesday</h3>

            <div class="input-group">
              <label>Lecture Start</label>
              <input type="time" id="Wednesday-start">
            </div>

            <div class="input-group">
              <label>Lecture End</label>
              <input type="time" id="Wednesday-end">
            </div>

            <div class="input-group">
              <label>Event / Plan</label>
              <input type="text" id="Wednesday-event">
            </div>

            <div class="checkbox">
              <input type="checkbox" id="Wednesday-busy">
              <label>Busy Evening</label>
            </div>
          </div>

          <!-- THURSDAY -->
          <div class="day-card">
            <h3>Thursday</h3>

            <div class="input-group">
              <label>Lecture Start</label>
              <input type="time" id="Thursday-start">
            </div>

            <div class="input-group">
              <label>Lecture End</label>
              <input type="time" id="Thursday-end">
            </div>

            <div class="input-group">
              <label>Event / Plan</label>
              <input type="text" id="Thursday-event" placeholder="HAIP">
            </div>

            <div class="checkbox">
              <input type="checkbox" id="Thursday-busy">
              <label>Busy Evening</label>
            </div>
          </div>

          <!-- FRIDAY -->
          <div class="day-card">
            <h3>Friday</h3>

            <div class="input-group">
              <label>Lecture Start</label>
              <input type="time" id="Friday-start">
            </div>

            <div class="input-group">
              <label>Lecture End</label>
              <input type="time" id="Friday-end">
            </div>

            <div class="input-group">
              <label>Event / Plan</label>
              <input type="text" id="Friday-event">
            </div>

            <div class="checkbox">
              <input type="checkbox" id="Friday-busy">
              <label>Busy Evening</label>
            </div>
          </div>

        </div>

      </section>

      <section>

        <div class="section-header">
          <h2>Generated Timetable</h2>
        </div>

        <div class="calendar-wrapper">

          <table>

            <thead>

              <tr>
                <th>Time</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
                <th>Sun</th>
              </tr>

            </thead>

            <tbody id="calendarBody"></tbody>

          </table>

        </div>

      </section>

    </main>

  </div>

  <script src="script.js"></script>

</body>
</html>
